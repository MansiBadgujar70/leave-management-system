<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Database Connection Error – LeaveMS</title>
  <!-- Bootstrap 5 CSS -->
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet"/>
  <!-- Bootstrap Icons -->
  <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css" rel="stylesheet"/>
  <!-- Google Fonts -->
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&display=swap" rel="stylesheet"/>
  <!-- Custom CSS -->
  <link href="{{ url_for('static', filename='css/style.css') }}" rel="stylesheet"/>
  <style>
    body {
      background: #f1f5f9;
      display: flex;
      align-items: center;
      justify-content: center;
      min-height: 100vh;
    }
    .error-card {
      background: white;
      border-radius: 20px;
      padding: 48px;
      box-shadow: 0 10px 40px rgba(0,0,0,.08);
      max-width: 550px;
      width: 100%;
      text-align: center;
      border: 1px solid #e2e8f0;
    }
    .error-code {
      font-size: 80px;
      font-weight: 800;
      background: linear-gradient(135deg, #f59e0b 0%, #d97706 100%);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      line-height: 1;
      margin-bottom: 16px;
    }
    .error-icon {
      font-size: 48px;
      color: #f59e0b;
      margin-bottom: 24px;
    }
    .debug-box {
      background: #f8fafc;
      border: 1px solid #e2e8f0;
      border-radius: 10px;
      text-align: left;
      font-family: monospace;
      font-size: 12px;
      padding: 16px;
      max-height: 200px;
      overflow-y: auto;
      white-space: pre-wrap;
      word-break: break-all;
    }
  </style>
</head>
<body>
  <div class="error-card">
    <div class="error-code">DB Error</div>
    <div class="error-icon">
      <i class="bi bi-database-fill-x"></i>
    </div>
    <h3 class="fw-800 text-dark mb-3">Database Connection Failed</h3>
    <p class="text-muted mb-4">
      The server was unable to connect to the database. This might be due to incorrect configuration, database engine being offline, or a network firewall issue.
    </p>

    {% if error_details %}
    <div class="mb-4">
      <button class="btn btn-sm btn-outline-secondary mb-2" type="button" data-bs-toggle="collapse" data-bs-target="#debugCollapse" aria-expanded="false" aria-controls="debugCollapse">
        <i class="bi bi-bug-fill me-1"></i>Toggle Debug Info
      </button>
      <div class="collapse" id="debugCollapse">
        <div class="debug-box mt-2">
          {{ error_details }}
        </div>
      </div>
    </div>
    {% endif %}

    <div class="d-flex gap-2">
      <button onclick="window.location.reload();" class="btn btn-primary btn-lg flex-grow-1">
        <i class="bi bi-arrow-clockwise me-2"></i>Retry Connection
      </button>
      <a href="/" class="btn btn-outline-secondary btn-lg flex-grow-1">
        <i class="bi bi-house-door-fill me-2"></i>Go to Home
      </a>
    </div>
  </div>

  <!-- Bootstrap 5 JS Bundle (needed for collapse) -->
  <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
